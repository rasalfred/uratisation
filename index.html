<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#071b20" />
    <meta
      name="description"
      content="Uratisation, un shoot'em up coloré créé par la team Blue Flower."
    />
    <title>Uratisation — Blue Flower</title>
  </head>
  <body>
    <main class="game-shell">
      <header class="hud" aria-label="Informations de la partie">
        <div>
          <span class="eyebrow">Opération</span>
          <h1>URATISATION</h1>
        </div>
        <dl class="stats">
          <div><dt>Score</dt><dd id="score">0000</dd></div>
          <div><dt>Vague</dt><dd id="wave">01</dd></div>
          <div><dt>Vies</dt><dd id="lives">● ● ●</dd></div>
        </dl>
      </header>

      <section class="arena" aria-label="Zone de jeu">
        <canvas id="game" width="720" height="960">
          Votre navigateur ne prend pas en charge Canvas.
        </canvas>
        <div class="scanlines" aria-hidden="true"></div>
        <div class="message" id="message">
          <p class="message-kicker">Prototype jouable</p>
          <h2>Prêt pour l’uratisation ?</h2>
          <p>Déplace-toi avec ZQSD, WASD ou les flèches. Le tir est automatique.</p>
          <button id="start" type="button">Lancer la mission</button>
        </div>
      </section>

      <footer>
        <p><span class="status-dot"></span> Système expérimental — sanctions désactivées</p>
        <p class="controls">Clavier, souris et tactile</p>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
